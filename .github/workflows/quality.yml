name: Code Quality

on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install ruff black isort mypy bandit pip-audit radon vulture pydocstyle interrogate codespell

    - name: Ruff
      run: ruff check .

    - name: Black
      run: black --check .

    - name: isort
      run: isort --check-only .

    - name: MyPy
      run: mypy .

    - name: Bandit
      run: bandit -r .

    - name: pip audit
      run: pip-audit

    - name: Radon
      run: radon cc . -a

    - name: Vulture
      run: vulture .

    - name: pydocstyle
      run: pydocstyle .

    - name: interrogate
      run: interrogate .

    - name: codespell
      run: codespell